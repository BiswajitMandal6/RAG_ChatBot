services:
  # ── FastAPI web server ───────────────────────────────────────────────────
  - type: web
    name: rag-chatbot-api
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: export PYTHONPATH=$PYTHONPATH:backend && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: backend
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        value: changeme
      - key: JWT_SECRET
        value: changeme
      - key: PINECONE_API_KEY
        value: changeme
      - key: PINECONE_INDEX
        value: college-rag
      - key: DATABASE_URL
        value: changeme
      - key: REDIS_URL
        value: changeme
      - key: DOCUMENTS_PATH
        value: /tmp/documents
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

  # ── Celery worker ────────────────────────────────────────────────────────
  - type: worker
    name: rag-chatbot-worker
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: export PYTHONPATH=$PYTHONPATH:backend && celery -A backend.celery_app worker --loglevel=info --concurrency=1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        value: changeme
      - key: PINECONE_API_KEY
        value: changeme
      - key: PINECONE_INDEX
        value: college-rag
      - key: DATABASE_URL
        value: changeme
      - key: REDIS_URL
        value: changeme
      - key: DOCUMENTS_PATH
        value: /tmp/documents
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
