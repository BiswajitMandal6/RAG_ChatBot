services:
  # ── FastAPI web server ───────────────────────────────────────────────────
  - type: web
    name: rag-chatbot-api
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: export PYTHONPATH=$PYTHONPATH:backend && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: backend
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        value: changeme
      - key: JWT_SECRET
        value: changeme
      - key: PINECONE_API_KEY
        value: changeme
      - key: PINECONE_INDEX
        value: college-rag
      # -----------------------------------------------------------------------
      # IMPORTANT: Use Supabase PgBouncer pooler URL (IPv4-compatible).
      # Render free tier does NOT support IPv6. The direct connection URL
      # (db.*.supabase.co:5432) uses IPv6 and will FAIL. Use the pooler URL below.
      # User format for pooler: postgres.<project-ref>:<password>
      # -----------------------------------------------------------------------
      - key: DATABASE_URL
        value: "postgresql://postgres.djgueupzzzphzznkqrbr:Biswajit%407411@aws-0-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require"
      # -----------------------------------------------------------------------
      # Set a real REDIS_URL if you have Redis (e.g., Upstash free tier).
      # Leave as 'disabled' to run without the crawler feature.
      # -----------------------------------------------------------------------
      - key: REDIS_URL
        value: disabled
      - key: DOCUMENTS_PATH
        value: /tmp/documents
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

  # ── Celery worker ────────────────────────────────────────────────────────
  - type: worker
    name: rag-chatbot-worker
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: export PYTHONPATH=$PYTHONPATH:backend && celery -A backend.celery_app worker --loglevel=info --concurrency=1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        value: changeme
      - key: PINECONE_API_KEY
        value: changeme
      - key: PINECONE_INDEX
        value: college-rag
      - key: DATABASE_URL
        value: "postgresql://postgres.djgueupzzzphzznkqrbr:Biswajit%407411@aws-0-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require"
      - key: REDIS_URL
        value: disabled
      - key: DOCUMENTS_PATH
        value: /tmp/documents
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
